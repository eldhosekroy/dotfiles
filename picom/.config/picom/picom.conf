backend = "glx";
vsync = true;
glx-use-copysubbuffer-mesa = true;

glx-copy-from-front = true;
glx-swap-method = 2;
xrender-sync = true;
xrender-sync-fence = true;

# Optional: Fade effects
fading = true;
fade-delta = 5;
fade-in-step = 0.03;
fade-out-step = 0.03;

# Optional: Shadow (can comment out if not needed)
shadow = true;
shadow-radius = 12;
shadow-opacity = 0.5;

